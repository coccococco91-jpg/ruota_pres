<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PRES WHEEL</title>

<style>

body{
    margin:0;
    min-height:100vh;
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}


h1{
    color:#ffd700;
    font-size:34px;
    margin-bottom:20px;
    text-align:center;
}


.container{
    position:relative;
}


#wheel{

    width:500px;
    height:500px;

    border-radius:50%;

    border:8px solid white;

    position:relative;

    transition:
    transform 5s cubic-bezier(0.15,0.85,0.25,1);

    background:
    conic-gradient(
    #e63946 0deg 36deg,
    #f77f00 36deg 72deg,
    #fcbf49 72deg 108deg,
    #06d6a0 108deg 144deg,
    #118ab2 144deg 180deg,
    #8338ec 180deg 216deg,
    #ff006e 216deg 252deg,
    #3a86ff 252deg 288deg,
    #222 288deg 324deg,
    #ffd700 324deg 360deg
    );

}



.pointer{

position:absolute;

top:-10px;

left:50%;

transform:translateX(-50%);

width:0;
height:0;

border-left:35px solid transparent;
border-right:35px solid transparent;

border-top:60px solid red;

z-index:20;

}





.label{

position:absolute;

width:170px;
height:70px;

top:215px;
left:165px;

font-size:20px;

font-weight:900;

line-height:23px;

text-align:center;

transform-origin:center;

color:white;

text-shadow:
3px 3px 5px black,
-2px -2px 5px black;

}





button{

margin-top:35px;

padding:18px 60px;

font-size:26px;

border-radius:40px;

border:none;

background:#ffd700;

font-weight:bold;

cursor:pointer;

}



#result{

margin-top:25px;

max-width:420px;

text-align:center;

font-size:20px;

padding:10px;

}



@media(max-width:600px){

#wheel{

width:360px;
height:360px;

}


.label{

width:120px;
left:120px;
top:155px;

font-size:14px;
line-height:16px;

}


h1{

font-size:26px;

}

button{

font-size:20px;

}


}


</style>

</head>


<body>


<h1>🍻 PRES WHEEL 🍻</h1>


<div class="container">


<div class="pointer"></div>


<div id="wheel">


<div class="label" style="transform:rotate(18deg) translateY(-190px)">
FREE<br>COCKTAIL
</div>


<div class="label" style="transform:rotate(54deg) translateY(-190px)">
SHOT<br>TIME
</div>


<div class="label" style="transform:rotate(90deg) translateY(-190px)">
PRES IS<br>THIRSTY
</div>


<div class="label" style="transform:rotate(126deg) translateY(-190px)">
PRES<br>GOT THIS
</div>


<div class="label" style="transform:rotate(162deg) translateY(-190px)">
DANCE<br>BATTLE
</div>


<div class="label" style="transform:rotate(198deg) translateY(-190px)">
TRIVIA<br>QUIZ
</div>


<div class="label" style="transform:rotate(234deg) translateY(-190px)">
BEER<br>PONG
</div>


<div class="label" style="transform:rotate(270deg) translateY(-190px)">
SELFIE<br>WITH PRES
</div>


<div class="label" style="transform:rotate(306deg) translateY(-190px)">
BECOME<br>THE PRES
</div>


<div class="label" style="transform:rotate(342deg) translateY(-190px)">
JACKPOT
</div>


</div>

</div>



<button id="spinBtn" onclick="spin()">
SPIN THE WHEEL
</button>



<div id="result"></div>




<script>


let wheel =
document.getElementById("wheel");


let result =
document.getElementById("result");



let prizes=[


"FREE COCKTAIL: The Pres offers you a cocktail!",


"SHOT TIME: The Pres offers you a shot!",


"THE PRES IS THIRSTY: Offer a shot to the Pres!",


"THE PRES GOT THIS: The Pres offers a shot to the crew!",


"DANCE BATTLE: Dance battle challenge against the Pres!",


"TRIVIA QUIZ: Challenge the Pres in the ultimate drinking quiz!",


"BEER PONG: 1vs1 against the Pres!",


"SELFIE WITH THE PRES: Take a selfie/video to post on social media!",


"BECOME THE PRES: What bad luck! The Pres hands you the role and the crew is thirsty! Buy the drinks!",


"JACKPOT: You are the chosen one of the Pres! Every time you need alcohol go to Cocktail Pub DISCO Reggio Emilia and the Pres will take care of you!"

];



function spin(){

document.getElementById("spinBtn").disabled = true;

let random = Math.random()*100;

let index;


// probabilità
if(random < 1){

    index = 9; // JACKPOT

}
else if(random < 4){

    index = 8; // BECOME THE PRES

}
else{

    index = Math.floor(Math.random()*8);

}


// 10 spicchi = 36 gradi
let slice = 36;


// centro dello spicchio
let targetAngle = (index * slice) + (slice / 2);


// reset rotazione e aggiungo giri completi
let finalRotation = 3600 + (360 - targetAngle);


wheel.style.transition =
"transform 5s cubic-bezier(0.15,0.85,0.25,1)";


wheel.style.transform =
"rotate(" + finalRotation + "deg)";



setTimeout(()=>{

result.innerHTML =
"🍺 RESULT 🍺<br><br>" +
prizes[index];

document.getElementById("spinBtn").disabled = true;

},5000);




}





</script>


</body>
</html>
