<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="top-text">
    PLAY WITH THE PRES<br>
    WIN THE CHALLENGE<br>
    STAY HYDRATED
</div>


<style>
.top-text{
    text-align:center;
    color:#ffffff;
    font-size:22px;
    font-weight:900;
    line-height:1.4;
    margin-bottom:25px;
    letter-spacing:2px;
    text-shadow: 2px 2px 8px black;
    }
body{
    margin:0;
    min-height:100vh;
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

h1{
    color:#ffd700;
    font-size:34px;
    margin-bottom:60px;
    text-align:center;
}

.container{ position:relative; }

#wheel{
    width:500px;
    height:500px;
    border-radius:50%;
    border:8px solid white;
    position:relative;
    transition:transform 5s cubic-bezier(0.15,0.85,0.25,1);
    background:conic-gradient(
        #e63946 0deg 36deg,
        #f77f00 36deg 72deg,
        #fcbf49 72deg 108deg,
        #06d6a0 108deg 144deg,
        #118ab2 144deg 180deg,
        #8338ec 180deg 216deg,
        #ff006e 216deg 252deg,
        #3a86ff 252deg 288deg,
        #222 288deg 324deg,
        #ffd700 324deg 360deg
    );
}

.pointer{
    position:absolute;
    top:-10px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:35px solid transparent;
    border-right:35px solid transparent;
    border-top:60px solid red;
    z-index:20;
}

.label{
    position:absolute;
    width:170px;
    height:70px;
    top:215px;
    left:165px;
    font-size:20px;
    font-weight:900;
    line-height:23px;
    text-align:center;
    transform-origin:center;
    color:white;
    text-shadow:3px 3px 5px black,-2px -2px 5px black;
}

button{
    margin-top:35px;
    padding:18px 60px;
    font-size:26px;
    border-radius:40px;
    border:none;
    background:#ffd700;
    font-weight:bold;
    cursor:pointer;
}

#result{
    margin-top:25px;
    max-width:420px;
    text-align:center;
    font-size:20px;
    padding:10px;
}

@media(max-width:600px){
    #wheel{width:360px;height:360px;}
    .label{width:120px;left:120px;top:155px;font-size:14px;line-height:16px;}
    h1{font-size:26px;}
    button{font-size:20px;}
}
</style>
</head>

<body>

<h1>🍻 PRES WHEEL 🍻</h1>

<div class="container">
<div class="pointer"></div>

<div id="wheel">

<div class="label" style="transform:rotate(18deg) translateY(-190px)">JACKPOT</div>
<div class="label" style="transform:rotate(54deg) translateY(-190px)">IDRATAZIONE</div>
<div class="label" style="transform:rotate(90deg) translateY(-190px)">QUIZ</div>
<div class="label" style="transform:rotate(126deg) translateY(-190px)">KARAOKE</div>
<div class="label" style="transform:rotate(162deg) translateY(-190px)">LUKA MODRIC</div>
<div class="label" style="transform:rotate(198deg) translateY(-190px)">DJ SET</div>
<div class="label" style="transform:rotate(234deg) translateY(-190px)">3 POINT SHOT</div>
<div class="label" style="transform:rotate(270deg) translateY(-190px)">HOLLYWOOD</div>
<div class="label" style="transform:rotate(306deg) translateY(-190px)">STICK CHALLENGE</div>
<div class="label" style="transform:rotate(342deg) translateY(-190px)">BLACKJACK</div>

</div>
</div>

<button id="spinBtn" onclick="spin()">SPIN THE WHEEL</button>

<div id="result"></div>

<script>
const wheel = document.getElementById("wheel");
const result = document.getElementById("result");

const prizes = [
"JACKPOT: You're the chosen one of the Pres! Next time you need drinks, hit up Cocktail Pub DISCO Reggio Emilia — the Pres got you covered!",

"HYDRATION: Yo, you look dehydrated! Drink up with the Pres!",

"QUIZ: ",

"KARAOKE: Grab the mic and go full send — sing your best track with the Pres!",

"LUKA MODRIC: 3 keep-ups challenge with the Pres — don’t drop it!",

"DJ SET: Take over the vibes — drop a mini DJ set and get at least 2 people dancing!",

"3 POINT SHOT: Clutch time! Sink the shot and celebrate with the Pres!",

"HOLLYWOOD: Act out a movie scene — if the crowd guesses it, everyone drinks!",

"STICK CHALLENGE: Reflex check! Don’t blink or you’re out!",

"BLACKJACK: Welcome to the table… the House always wins, but tonight you still drink."
] ;
// pesi (1% + 9×11%)
const weights = [1,11,11,11,11,11,11,11,11,11];
let hasSpun = false;
function spin(){
if (hasSpun) return;

hasSpun = true;
const btn = document.getElementById("spinBtn");
btn.disabled = true;
btn.style.opacity = "0.5";
btn.style.cursor = "not-allowed";

// scelta pesata
let random = Math.random()*100;
let sum = 0;
let index = 0;

for(let i=0;i<weights.length;i++){
    sum += weights[i];
    if(random < sum){
        index = i;
        break;
    }
}

let slice = 36;
let targetAngle = (index * slice) + (slice / 2);
let finalRotation = 3600 + (360 - targetAngle);

wheel.style.transition = "transform 5s cubic-bezier(0.15,0.85,0.25,1)";
wheel.style.transform = "rotate(" + finalRotation + "deg)";

setTimeout(()=>{
    result.innerHTML = "🍺 RESULT 🍺<br><br>" + prizes[index];
    btn.disabled = false;
btn.style.opacity = "1";
btn.style.cursor = "pointer";
},5000);

}
</script>

</body>
</html>
